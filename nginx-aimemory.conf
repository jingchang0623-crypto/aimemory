# aimemory.pro Nginx Configuration
# Generated: 2026-04-28
# 
# DEPLOYMENT:
#   sudo cp /home/agentuser/aimemory/nginx-aimemory.conf /etc/nginx/sites-available/aimemory.pro
#   sudo nginx -t
#   sudo systemctl reload nginx

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name aimemory.pro www.aimemory.pro;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name aimemory.pro www.aimemory.pro;

    client_max_body_size 50M;

    # SSL
    ssl_certificate /etc/letsencrypt/live/aimemory.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aimemory.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS (was missing!)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
