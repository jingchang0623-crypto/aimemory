<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom, #f9fafb, #ffffff);
      color: #111827;
    }
    
    .header {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      background: white;
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header p {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 16px;
    }
    
    .stat-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #3b82f6;
    }
    
    .stat-label {
      font-size: 10px;
      color: #6b7280;
      margin-top: 4px;
    }
    
    .actions {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .btn-secondary {
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    
    .btn-secondary:hover {
      background: #f3f4f6;
    }
    
    .conversations {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
    }
    
    .conversations h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #374151;
    }
    
    .conv-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    
    .conv-item:last-child {
      border-bottom: none;
    }
    
    .conv-title {
      font-size: 13px;
      color: #111827;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .conv-platform {
      font-size: 10px;
      padding: 2px 6px;
      background: #f3f4f6;
      border-radius: 4px;
      color: #6b7280;
      margin-left: 8px;
    }
    
    .empty {
      text-align: center;
      padding: 24px;
      color: #9ca3af;
      font-size: 13px;
    }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
    }
    
    .footer a {
      color: #3b82f6;
      text-decoration: none;
    }
    
    .status {
      padding: 8px 16px;
      background: #f0fdf4;
      color: #166534;
      font-size: 12px;
      display: none;
    }
    
    .status.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 AI Memory</h1>
    <p>Your AI conversations, organized and searchable</p>
  </div>
  
  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="total-count">0</div>
      <div class="stat-label">Conversations</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="saved-count">0</div>
      <div class="stat-label">Saved Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="platform-count">0</div>
      <div class="stat-label">Platforms</div>
    </div>
  </div>
  
  <div class="status" id="status"></div>
  
  <div class="actions">
    <button class="btn btn-primary" id="save-btn">
      💾 Save Current Chat
    </button>
    <a href="https://aimemory.pro" target="_blank" class="btn btn-secondary">
      🌐 Open AI Memory
    </a>
    <button class="btn btn-secondary" id="export-btn">
      📤 Export All Data
    </button>
  </div>
  
  <div class="conversations">
    <h2>Recent Conversations</h2>
    <div id="conv-list">
      <div class="empty">No conversations saved yet</div>
    </div>
  </div>
  
  <div class="footer">
    <a href="https://aimemory.pro" target="_blank">aimemory.pro</a> · 100% private
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
